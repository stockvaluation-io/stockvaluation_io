name: valuation-drift-regression

on:
  pull_request:
    paths:
      - "valuation-service/**"
      - ".etl/**"
      - "scripts/local_release_check.sh"
      - "scripts/stockjson_sample_regression.sh"
      - "data/stock.json"
      - ".etl/regression/regression/valuation_baseline_golden_2026.json"
      - "docker-compose.local.yml"
  push:
    branches:
      - main
    paths:
      - "valuation-service/**"
      - ".etl/**"
      - "scripts/local_release_check.sh"
      - "scripts/stockjson_sample_regression.sh"
      - "data/stock.json"
      - ".etl/regression/regression/valuation_baseline_golden_2026.json"
      - "docker-compose.local.yml"
  workflow_dispatch:

jobs:
  drift-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env file
        run: |
          cat > .env.ci <<'EOF'
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=stockvaluation_io
          CURRENCY_API_BASE_URL=https://api.exchangerate.host
          CURRENCY_API_KEY=ci-local-key
          DEFAULT_USERNAME=ci-user
          DEFAULT_PASSWORD=ci-password
          DEFAULT_FIRSTNAME=CI
          DEFAULT_LASTNAME=Runner
          DEFAULT_CONTACT=ci@example.com
          EOF

      - name: Build and start valuation stack
        run: |
          docker compose -f docker-compose.local.yml --env-file .env.ci up -d --build postgres redis yfinance valuation-service

      - name: Wait for valuation-service health
        run: |
          for i in $(seq 1 90); do
            code="$(curl -s -o /tmp/vs-health.json -w '%{http_code}' http://localhost:8081/actuator/health || true)"
            if [ "$code" = "200" ]; then
              cat /tmp/vs-health.json
              exit 0
            fi
            sleep 5
          done
          echo "valuation-service did not become healthy in time"
          docker compose -f docker-compose.local.yml --env-file .env.ci ps
          docker compose -f docker-compose.local.yml --env-file .env.ci logs --no-color valuation-service yfinance postgres redis || true
          exit 1

      - name: Run mandatory drift release gate
        run: |
          ./scripts/local_release_check.sh \
            --skip-smoke \
            --baseline-file .etl/regression/regression/valuation_baseline_golden_2026.json \
            --report-json .etl/regression/regression/ci_valuation_drift_report.json \
            --report-md .etl/regression/regression/ci_valuation_drift_report.md

      - name: Run stock.json sample regression gate
        run: |
          ./scripts/stockjson_sample_regression.sh \
            --report-json .etl/regression/regression/ci_stockjson_sample_regression.json \
            --report-md .etl/regression/regression/ci_stockjson_sample_regression.md \
            --max-data-insufficiency 20

      - name: Upload drift reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valuation-drift-reports
          path: |
            .etl/regression/regression/ci_valuation_drift_report.json
            .etl/regression/regression/ci_valuation_drift_report.md
            .etl/regression/regression/ci_stockjson_sample_regression.json
            .etl/regression/regression/ci_stockjson_sample_regression.md

      - name: Dump docker logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.local.yml --env-file .env.ci ps
          docker compose -f docker-compose.local.yml --env-file .env.ci logs --no-color valuation-service yfinance postgres redis || true

      - name: Shutdown stack
        if: always()
        run: |
          docker compose -f docker-compose.local.yml --env-file .env.ci down -v
