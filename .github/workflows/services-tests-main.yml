name: Service Tests On Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bullbeargpt-tests:
    name: bullbeargpt tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bullbeargpt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: bullbeargpt/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: |
          if find tests -type f -name "test_*.py" | grep -q .; then
            pytest -q tests
          else
            echo "No tests found for bullbeargpt. Skipping."
          fi

  valuation-agent-tests:
    name: valuation-agent tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: valuation-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            valuation-agent/requirements.txt
            valuation-agent/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          if find tests -type f -name "test_*.py" | grep -q .; then
            pytest
          else
            echo "No tests found for valuation-agent. Skipping."
          fi

  valuation-service-tests:
    name: valuation-service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: valuation-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -B -ntp test

  frontend-tests:
    name: frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          CI: "true"
        run: npm run test -- --watch=false --browsers=ChromeHeadlessNoSandbox

  yfinance-tests:
    name: yfinance tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yfinance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: yfinance/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: |
          if [ -d tests ] && find tests -type f -name "test_*.py" | grep -q .; then
            pytest -q tests
          else
            echo "No tests found for yfinance. Skipping."
          fi
