#---------------------APPLICATION CONFIG------------------------------------#
spring.application.name=${APPLICATION_NAME:StockValuationBackend}
server.port=${APPLICATION_PORT:8080}
yahoo.base.url=${YAHOO_SERVER_URL:http://localhost:5000/api-s}
angular.app.url=${ANGULAR_APP_URL:http://localhost:4200}
logging.level.root=ERROR
logging.level.io.stockvaluation.service.MonteCarloValuationService=INFO
logging.level.io.stockvaluation.controller.AutomatedDCFAnalysisController=INFO
#---------------------POSTGRES CONFIG------------------------------------#
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
#---------------------DEFAULT USER CONFIG -----------------------------#
default.username=${DEFAULT_USERNAME:admin}
default.password=${DEFAULT_PASSWORD:admin}
default.firstname=${DEFAULT_FIRSTNAME:Admin}
default.lastname=${DEFAULT_LASTNAME:User}
default.contact=${DEFAULT_CONTACT:admin@stockvaluation.io}
#---------------------INTRINSIC PRICING CONFIG -----------------------------#
intrinsic.pricing.url=http://intrinsic-pricing:5004
intrinsic.pricing.enable.v1.v2.comparison=${INTRINSIC_PRICING_ENABLE_V1_V2_COMPARISON:false}
#---------------------ML DCF FORECAST CONFIG -----------------------------#
ml.dcf.forecast.url=${ML_DCF_FORECAST_URL:http://ml-dcf-forecast:8003}
ml.dcf.monte-carlo.paths=${ML_DCF_MONTE_CARLO_PATHS:1000}
#---------------------TIMEOUT CONFIG ---    --------------------------#
spring.mvc.async.request-timeout=1200000
server.tomcat.connection-timeout=1200000