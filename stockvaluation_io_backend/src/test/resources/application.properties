# Test configuration with default values
# These override the main application.properties for testing

#---------------------APPLICATION CONFIG------------------------------------#
spring.application.name=${APPLICATION_NAME:StockValuationBackend}
server.port=${APPLICATION_PORT:8080}
yahoo.base.url=${YAHOO_SERVER_URL:http://localhost:5000/api-s}
angular.app.url=${ANGULAR_APP_URL:http://localhost:4200}
logging.level.root=INFO

#---------------------POSTGRES CONFIG------------------------------------#
# Use in-memory H2 database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

#---------------------DEFAULT USER CONFIG -----------------------------#
default.username=${DEFAULT_USERNAME:testuser}
default.password=${DEFAULT_PASSWORD:testpass}
default.firstname=${DEFAULT_FIRSTNAME:Test}
default.lastname=${DEFAULT_LASTNAME:User}
default.contact=${DEFAULT_CONTACT:test@example.com}

