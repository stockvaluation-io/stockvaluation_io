#---------------------APPLICATION CONFIG------------------------------------#
spring.application.name=${APPLICATION_NAME:StockValuationBackend}
server.port=${APPLICATION_PORT:8081}
provider.yfinance.base-url=${YFINANCE_BASE_URL}
provider.valuation-agent.base-url=${VALUATION_AGENT_BASE_URL}
logging.level.root=ERROR
#---------------------POSTGRES CONFIG------------------------------------#
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
#---------------------EXTERNAL API CONFIG--------------------------------#
currency.api.base-url=${CURRENCY_API_BASE_URL}
currency.api.key=${CURRENCY_API_KEY}
#---------------------DEFAULT USER CONFIG -----------------------------#
default.username=${DEFAULT_USERNAME}
default.password=${DEFAULT_PASSWORD}
default.firstname=${DEFAULT_FIRSTNAME}
default.lastname=${DEFAULT_LASTNAME}
default.contact=${DEFAULT_CONTACT}
#---------------------TIMEOUT CONFIG ---    --------------------------#
spring.mvc.async.request-timeout=1200000
server.tomcat.connection-timeout=1200000
#---------------------VALUATION ASSUMPTIONS CONFIG--------------------#
valuation.assumptions.pre-tax-cost-of-debt=${VALUATION_PRE_TAX_COST_OF_DEBT:0.05}
valuation.assumptions.convergence-year-margin=${VALUATION_CONVERGENCE_YEAR_MARGIN:0.05}
valuation.assumptions.mature-market-premium=${VALUATION_MATURE_MARKET_PREMIUM:4.23}
valuation.assumptions.baseline-risk-free-rate=${VALUATION_BASELINE_RISK_FREE_RATE:4.58}
valuation.assumptions.mature-market-country=${VALUATION_MATURE_MARKET_COUNTRY:United States}
valuation.assumptions.baseline-risk-free-currency-code=${VALUATION_BASELINE_RISK_FREE_CURRENCY_CODE:USD}
valuation.assumptions.simulation-iterations=${VALUATION_SIMULATION_ITERATIONS:10000}
valuation.assumptions.calibration-max-iterations=${VALUATION_CALIBRATION_MAX_ITERATIONS:10000}
valuation.template.expected-inflation=${VALUATION_TEMPLATE_EXPECTED_INFLATION:0.03}
valuation.template.expected-real-growth=${VALUATION_TEMPLATE_EXPECTED_REAL_GROWTH:0.02}
valuation.template.stable-growth-spread=${VALUATION_TEMPLATE_STABLE_GROWTH_SPREAD:0.0101}
valuation.template.high-growth-spread=${VALUATION_TEMPLATE_HIGH_GROWTH_SPREAD:0.06}
valuation.template.default-debt-ratio=${VALUATION_TEMPLATE_DEFAULT_DEBT_RATIO:0.04}
valuation.template.default-growth-rate=${VALUATION_TEMPLATE_DEFAULT_GROWTH_RATE:0.10}
valuation.template.sustainable-advantage-spread=${VALUATION_TEMPLATE_SUSTAINABLE_ADVANTAGE_SPREAD:0.06}
valuation.template.default-projection-years=${VALUATION_TEMPLATE_DEFAULT_PROJECTION_YEARS:10}
valuation.template.three-stage-projection-years=${VALUATION_TEMPLATE_THREE_STAGE_PROJECTION_YEARS:15}
valuation.template.default-normalized-margin=${VALUATION_TEMPLATE_DEFAULT_NORMALIZED_MARGIN:15.0}
valuation.synthetic-rating.large-cap-threshold=${VALUATION_SYNTHETIC_LARGE_CAP_THRESHOLD:5000000000}
valuation.synthetic-rating.default-country=${VALUATION_SYNTHETIC_DEFAULT_COUNTRY:United States}
valuation.synthetic-rating.interest-coverage-ceiling=${VALUATION_SYNTHETIC_INTEREST_COVERAGE_CEILING:100000}
valuation.synthetic-rating.interest-coverage-floor=${VALUATION_SYNTHETIC_INTEREST_COVERAGE_FLOOR:-100000}
